<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>IRIS — Collega Email di NEXO</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-soft: #fafafa;
    --border: #e6e6ea;
    --border-strong: #d1d1d7;
    --text: #1a1a1f;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --accent: #2563eb;
    --ok: #059669;
    --warn: #d97706;
    --err: #dc2626;

    /* Category palette — soft backgrounds + saturated text, inspired by Linear/Notion labels. */
    --cat-richiesta-bg: #eff6ff;      --cat-richiesta-fg: #1d4ed8;      --cat-richiesta-bd: #bfdbfe;
    --cat-guasto-bg: #fef2f2;         --cat-guasto-fg: #b91c1c;         --cat-guasto-bd: #fecaca;
    --cat-preventivo-bg: #ecfdf5;     --cat-preventivo-fg: #047857;     --cat-preventivo-bd: #a7f3d0;
    --cat-conferma-bg: #ecfdf5;       --cat-conferma-fg: #047857;       --cat-conferma-bd: #a7f3d0;
    --cat-fattura-bg: #fff7ed;        --cat-fattura-fg: #c2410c;        --cat-fattura-bd: #fed7aa;
    --cat-interna-bg: #f3f4f6;        --cat-interna-fg: #4b5563;        --cat-interna-bd: #e5e7eb;
    --cat-pec-bg: #f5f3ff;            --cat-pec-fg: #6d28d9;            --cat-pec-bd: #ddd6fe;
    --cat-admin-bg: #eff6ff;          --cat-admin-fg: #1d4ed8;          --cat-admin-bd: #bfdbfe;
    --cat-risposta-bg: #ecfdf5;       --cat-risposta-fg: #047857;       --cat-risposta-bd: #a7f3d0;
    --cat-spam-bg: #f9fafb;           --cat-spam-fg: #9ca3af;           --cat-spam-bd: #e5e7eb;
    --cat-altro-bg: #f3f4f6;          --cat-altro-fg: #6b7280;          --cat-altro-bd: #e5e7eb;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font: inherit; cursor: pointer; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }

  /* --- Login view (manteniamo, anche se in v0.1 è bypassata) --- */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--surface-soft);
  }
  .login-wrap.hidden { display: none; }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow-md);
  }
  .login-card h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .login-card .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.95rem;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 500;
    font-size: 0.95rem;
    transition: background 0.12s;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary.full { width: 100%; }
  .login-error { color: var(--err); font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }

  /* --- App shell --- */
  .app { display: none; }
  .app.active { display: block; }

  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header .brand {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .header .brand .brand-sub {
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 6px;
    font-size: 0.85rem;
  }
  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 0.85rem;
  }
  .header-stat { color: var(--text-muted); }
  .header-stat strong { color: var(--text); font-weight: 600; }
  .header-stat.urgent strong { color: var(--err); }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    color: var(--text-muted);
    transition: border-color 0.12s, color 0.12s;
  }
  .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }

  main { max-width: 860px; margin: 0 auto; padding: 20px; }

  /* --- Filter bar --- */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-bar select,
  .filter-bar input[type="search"],
  .filter-bar input[type="date"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    min-height: 36px;
  }
  .filter-bar select:focus,
  .filter-bar input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }
  .filter-bar input[type="search"] {
    flex: 1 1 220px;
    min-width: 180px;
  }
  .filter-bar .count {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-left: auto;
  }

  /* --- Email cards --- */
  .email-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .email-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.12s;
  }
  .email-card:hover { border-color: var(--border-strong); }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }
  .sender { font-weight: 600; font-size: 0.98rem; color: var(--text); word-break: break-word; }
  .received { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; flex-shrink: 0; }
  .subject { font-weight: 600; font-size: 1rem; margin-top: 4px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .summary {
    color: var(--text-muted);
    font-size: 0.92rem;
    margin: 8px 0 12px 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entities {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .chip {
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .chip strong { color: var(--text); font-weight: 500; }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    border: 1px solid transparent;
    line-height: 1.5;
  }

  /* Category badge palette */
  .badge.cat-RICHIESTA_INTERVENTO       { background: var(--cat-richiesta-bg);  color: var(--cat-richiesta-fg);  border-color: var(--cat-richiesta-bd); }
  .badge.cat-GUASTO_URGENTE             { background: var(--cat-guasto-bg);     color: var(--cat-guasto-fg);     border-color: var(--cat-guasto-bd); }
  .badge.cat-PREVENTIVO                 { background: var(--cat-preventivo-bg); color: var(--cat-preventivo-fg); border-color: var(--cat-preventivo-bd); }
  .badge.cat-CONFERMA_APPUNTAMENTO      { background: var(--cat-conferma-bg);   color: var(--cat-conferma-fg);   border-color: var(--cat-conferma-bd); }
  .badge.cat-FATTURA_FORNITORE          { background: var(--cat-fattura-bg);    color: var(--cat-fattura-fg);    border-color: var(--cat-fattura-bd); }
  .badge.cat-COMUNICAZIONE_INTERNA      { background: var(--cat-interna-bg);    color: var(--cat-interna-fg);    border-color: var(--cat-interna-bd); }
  .badge.cat-PEC_UFFICIALE              { background: var(--cat-pec-bg);        color: var(--cat-pec-fg);        border-color: var(--cat-pec-bd); }
  .badge.cat-AMMINISTRATORE_CONDOMINIO  { background: var(--cat-admin-bg);      color: var(--cat-admin-fg);      border-color: var(--cat-admin-bd); }
  .badge.cat-RISPOSTA_CLIENTE           { background: var(--cat-risposta-bg);   color: var(--cat-risposta-fg);   border-color: var(--cat-risposta-bd); }
  .badge.cat-NEWSLETTER_SPAM            { background: var(--cat-spam-bg);       color: var(--cat-spam-fg);       border-color: var(--cat-spam-bd); }
  .badge.cat-ALTRO                      { background: var(--cat-altro-bg);      color: var(--cat-altro-fg);      border-color: var(--cat-altro-bd); }

  /* Confidence badge */
  .badge.conf {
    background: var(--surface-soft);
    color: var(--text-muted);
    border-color: var(--border);
  }
  .badge.conf .pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .badge.conf.high .pip { background: var(--ok); }
  .badge.conf.medium .pip { background: var(--warn); }
  .badge.conf.low .pip { background: var(--err); }

  /* Attention / followup badges — F3 */
  .badge.attn {
    background: #fef2f2;
    color: #b91c1c;
    border-color: #fecaca;
  }
  .badge.attn.warn {
    background: #fff7ed;
    color: #c2410c;
    border-color: #fed7aa;
  }
  .badge.followup {
    background: #f5f3ff;
    color: #6d28d9;
    border-color: #ddd6fe;
    cursor: pointer;
    transition: filter 0.12s;
  }
  .badge.followup:hover { filter: brightness(0.95); }

  .header-stat.attention strong { color: #c2410c; }

  /* Sentiment badge — soft surface + coloured dot, same language as confidence */
  .badge.sent {
    background: var(--surface-soft);
    color: var(--text-muted);
    border-color: var(--border);
  }
  .badge.sent .sent-emoji { font-size: 0.9em; line-height: 1; }
  .badge.sent-positivo    { color: #047857; border-color: #a7f3d0; background: #ecfdf5; }
  .badge.sent-neutro      { color: #6b7280; border-color: #e5e7eb; background: #f9fafb; }
  .badge.sent-frustrato   { color: #a16207; border-color: #fde68a; background: #fefce8; }
  .badge.sent-arrabbiato  { color: #c2410c; border-color: #fed7aa; background: #fff7ed; }
  .badge.sent-disperato   { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }

  .card-actions { display: flex; gap: 6px; }
  .btn-link {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    color: var(--text-muted);
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .btn-link:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-soft); }

  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 48px 20px;
    background: var(--surface-soft);
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  /* --- Similar emails section (F12) --- */
  .similar-section {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .similar-section h4 {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 8px;
  }
  .similar-empty {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-style: italic;
  }
  .similar-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .similar-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface-soft);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    text-align: left;
    font: inherit;
    color: inherit;
    width: 100%;
  }
  .similar-item:hover {
    border-color: var(--border-strong);
    background: var(--surface);
  }
  .similar-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .similar-date {
    font-size: 0.78rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .similar-match-key {
    display: inline-flex;
    align-items: center;
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 0.7rem;
    background: var(--cat-richiesta-bg);
    color: var(--cat-richiesta-fg);
    border: 1px solid var(--cat-richiesta-bd);
    text-transform: lowercase;
  }
  .similar-summary {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.45;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .similar-handled {
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .similar-handled .pill {
    padding: 1px 7px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .similar-handled .pill.replied { color: var(--ok); border-color: #a7f3d0; background: #ecfdf5; }
  .similar-handled .pill.attn { color: #c2410c; border-color: #fed7aa; background: #fff7ed; }
  .similar-handled .pill.corrected { color: #6d28d9; border-color: #ddd6fe; background: #f5f3ff; }

  /* --- Sender profile popover (F5) --- */
  .sender-clickable {
    cursor: pointer;
    border-bottom: 1px dotted var(--text-dim);
    transition: color 0.12s, border-color 0.12s;
  }
  .sender-clickable:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .frequent-star {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fef3c7;
    color: #b45309;
    font-size: 0.7rem;
    margin-left: 6px;
    cursor: help;
    border: 1px solid #fde68a;
    line-height: 1;
  }
  .sender-popover {
    position: fixed;
    z-index: 200;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    padding: 14px 16px;
    min-width: 280px;
    max-width: 360px;
    font-size: 0.88rem;
    color: var(--text);
    display: none;
  }
  .sender-popover.open { display: block; }
  .sender-popover h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 2px;
    word-break: break-word;
  }
  .sender-popover .pop-email {
    color: var(--text-muted);
    font-size: 0.78rem;
    margin-bottom: 10px;
    word-break: break-all;
  }
  .sender-popover .pop-line {
    margin-bottom: 6px;
    color: var(--text);
  }
  .sender-popover .pop-line strong { font-weight: 600; }
  .sender-popover .pop-cats {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .sender-popover .pop-cats .badge {
    font-size: 0.72rem;
    padding: 1px 7px;
  }
  .sender-popover .pop-condos {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.4;
  }
  .sender-popover .pop-frequent {
    display: inline-block;
    background: #fef3c7;
    color: #b45309;
    border: 1px solid #fde68a;
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 0.72rem;
    font-weight: 500;
    margin-left: 6px;
  }
  .sender-popover .pop-empty {
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.85rem;
  }
  .sender-popover .pop-close {
    position: absolute;
    top: 6px;
    right: 8px;
    background: transparent;
    border: none;
    font-size: 1.1rem;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
  }
  .sender-popover .pop-close:hover { color: var(--text); }

  /* --- Digest card (F4) --- */
  .digest {
    background: linear-gradient(180deg, #f0f7ff 0%, #f8fbff 100%);
    border: 1px solid var(--cat-richiesta-bd);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-md);
  }
  .digest-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .digest-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }
  .digest-title .digest-icon { font-size: 1.15rem; line-height: 1; }
  .digest-updated {
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .digest-summary {
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .digest-summary .num {
    font-weight: 600;
  }
  .digest-summary .num.urgent { color: var(--err); }
  .digest-summary .num.attn { color: #c2410c; }
  .digest-top {
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--cat-richiesta-bd);
    padding-top: 10px;
  }
  .digest-top-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .digest-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: baseline;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    text-align: left;
    background: transparent;
    border: none;
    width: 100%;
    font: inherit;
    color: inherit;
  }
  .digest-item:hover { background: rgba(37, 99, 235, 0.08); }
  .digest-item-rank {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-weight: 600;
    min-width: 18px;
  }
  .digest-item-text {
    overflow: hidden;
    min-width: 0;
  }
  .digest-item-sender {
    font-size: 0.82rem;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .digest-item-summary {
    font-size: 0.9rem;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .digest-item-badge {
    flex-shrink: 0;
    font-size: 0.72rem;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-weight: 500;
    white-space: nowrap;
  }
  .digest-empty {
    color: var(--text-muted);
    font-size: 0.88rem;
    font-style: italic;
    padding: 4px 8px;
  }

  /* --- View toggle (email / thread) --- */
  .view-toggle {
    display: inline-flex;
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
    gap: 2px;
  }
  .view-toggle button {
    background: transparent;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.85rem;

let _firestoreCache = null;
async function getFirestore() {

async function loadEmailsFromFirestore() {
  try {
    const { db, fsMod } = await getFirestore();
    const q = fsMod.query(
      fsMod.collection(db, "iris_emails"),
      fsMod.orderBy("raw.received_time", "desc"),
      fsMod.limit(100),
    );
    const snap = await fsMod.getDocs(q);
    const emails = [];
    snap.forEach((doc) => {
      const d = doc.data();
      const raw = d.raw || {};
      const cls = d.classification || {};
      const fu = d.followup || null;
      emails.push({
        id: doc.id,
        received: raw.received_time || "",
        senderEmail: raw.sender || "",
        senderName: raw.sender_name || "",
        sender: raw.sender_name
          ? `${raw.sender_name} <${raw.sender}>`
          : (raw.sender || "(sconosciuto)"),
        subject: raw.subject || "(nessun oggetto)",
        category: cls.category || "ALTRO",
        confidence: cls.confidence || "low",
        summary: cls.summary || "",
        entities: cls.entities || {},
        action: cls.suggestedAction || "ARCHIVIA",
        bodyText: raw.body_text || "",
        sentiment: cls.sentiment || "neutro",
        sentimentReason: cls.sentimentReason || "",
        followup: fu ? {
          isFollowup: !!fu.isFollowup,
          originalEmailId: fu.originalEmailId || null,
          originalDocId: fu.originalDocId || null,
          daysWithoutReply: Number(fu.daysWithoutReply || 0),
          needsAttention: !!fu.needsAttention,
        } : null,
        similarEmails: Array.isArray(d.similarEmails) ? d.similarEmails : [],
      });
    });
    return emails;
  } catch (err) {
    console.warn("[IRIS] Firestore load failed, using mock data:", err.message || err);
    return null;
  }
}

async function loadSenderProfilesFromFirestore() {
  try {
    const { db, fsMod } = await getFirestore();
    const snap = await fsMod.getDocs(fsMod.collection(db, "iris_sender_profiles"));
    const map = new Map();
    snap.forEach((doc) => {
      const d = doc.data();
      const email = (d.email || "").toLowerCase();
      if (email) map.set(email, d);
    });
    return map;
  } catch (err) {
    console.warn("[IRIS] sender profiles load failed:", err.message || err);
    return new Map();
  }
}

async function loadThreadsFromFirestore() {
  try {
    const { db, fsMod } = await getFirestore();
    const q = fsMod.query(
      fsMod.collection(db, "iris_threads"),
      fsMod.orderBy("lastMessageAt", "desc"),
      fsMod.limit(100),
    );
    const snap = await fsMod.getDocs(q);
    const threads = [];

      });
    });
    return threads;
  } catch (err) {
    console.warn("[IRIS] Threads load failed:", err.message || err);

}

// --- DOM helpers ---
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function formatReceived(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return iso;
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) {
      return d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
    }
    return d.toLocaleDateString("it-IT", { day: "2-digit", month: "short" });
  } catch { return iso; }
}
function formatReceivedFull(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return iso;
    return d.toLocaleString("it-IT", {
      day: "2-digit", month: "2-digit", year: "numeric",
      hour: "2-digit", minute: "2-digit",
    });
  } catch { return iso; }
}

// --- Stats ---
function updateHeaderStats(emails) {
  const total = emails.length;
  const urgent = emails.filter(e => URGENT_CATEGORIES.has(e.category)).length;
  const attention = emails.filter(e => e.followup && e.followup.needsAttention).length;
  $("#statTotal").textContent = total;
  $("#statUrgent").textContent = urgent;
  $("#statAttention").textContent = attention;
}

// --- Card rendering ---
function renderEntities(ent) {
  const keys = Object.keys(ent || {});
  if (!keys.length) return "";
  return `<div class="entities">${keys.map(k => `
    <span class="chip"><strong>${escapeHtml(k)}:</strong> ${escapeHtml(ent[k])}</span>
  `).join("")}</div>`;
}

function renderFollowupBadges(e) {
  const fu = e.followup;
  if (!fu) return "";
  const parts = [];
  if (fu.needsAttention) {
    const days = fu.daysWithoutReply;
    const cls = days >= 7 ? "" : "warn";
    const label = days <= 0
      ? "In attesa di risposta"
      : `In attesa da ${days} ${days === 1 ? "giorno" : "giorni"}`;
    parts.push(
      `<span class="badge attn ${cls}" title="Nessuna risposta inviata da Alberto">⏰ ${escapeHtml(label)}</span>`
    );
  }
  if (fu.isFollowup) {
    const orig = fu.originalDocId || fu.originalEmailId;
    const attr = orig ? `data-followup-original="${escapeHtml(orig)}"` : "";
    const title = orig ? "Apri l'email originale" : "Sollecito (originale non in elenco)";
    parts.push(
      `<span class="badge followup" ${attr} title="${escapeHtml(title)}">🔄 Sollecito</span>`
    );
  }
  return parts.join("");
}

function renderSentimentBadge(e) {
  const s = e.sentiment || "neutro";
  const meta = SENTIMENT_LABELS[s] || SENTIMENT_LABELS.neutro;
  const title = e.sentimentReason ? `title="${escapeHtml(e.sentimentReason)}"` : "";
  return `<span class="badge sent sent-${escapeHtml(s)}" ${title}>` +
    `<span class="sent-emoji" aria-hidden="true">${meta.emoji}</span>` +
    `${escapeHtml(meta.label)}</span>`;
}
function renderEmailCard(e) {
  const senderHtml = renderSenderInline(e.senderEmail || e.sender, e.senderName);
  return `
    <article class="email-card" data-id="${escapeHtml(e.id)}">
      <div class="card-top">
        <div class="sender">${senderHtml}</div>
        <div class="received" title="${escapeHtml(formatReceivedFull(e.received))}">${escapeHtml(formatReceived(e.received))}</div>

      <div class="subject">${escapeHtml(e.subject)}</div>

          <span class="badge cat-${escapeHtml(e.category)}">${escapeHtml(CATEGORY_LABELS[e.category] || e.category)}</span>
          <span class="badge conf ${escapeHtml(e.confidence)}"><span class="pip"></span>${escapeHtml(CONFIDENCE_LABELS[e.confidence] || e.confidence)}</span>
          ${renderSentimentBadge(e)}
          ${renderFollowupBadges(e)}
        </div>
        <div class="card-actions">

function applyFilters(emails) {
  const cat = $("#filterCategory").value;
  const q = ($("#filterSearch").value || "").trim().toLowerCase();
  return emails.filter(e => {
    if (cat && e.category !== cat) return false;
    if (q) {
      const hay = `${e.sender} ${e.subject} ${e.summary} ${e.bodyText || ""}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function wireFollowupClicks(root) {
  $$("[data-followup-original]", root).forEach(badge => {
    badge.addEventListener("click", (ev) => {
      ev.stopPropagation();
      openReadModal(badge.dataset.followupOriginal);
    });
  });
}

function render(emails) {
  const filtered = applyFilters(emails);
  const list = $("#emailList");
  if (!filtered.length) {
    $("#filterCount").textContent = `0 email`;
    list.innerHTML = `<div class="empty">Nessuna email corrisponde ai filtri.</div>`;
    return;
  }
  $("#filterCount").textContent = `${filtered.length} email`;
  list.innerHTML = filtered.map(renderEmailCard).join("");
  $$("[data-read]", list).forEach(btn => {
    btn.addEventListener("click", () => openReadModal(btn.dataset.read));
  });
  $$("[data-correct]", list).forEach(btn => {
    btn.addEventListener("click", () => openCorrectionModal(btn.dataset.correct));
  });
  wireFollowupClicks(list);
  wireSenderClicks(list);
}

// --- Thread rendering ---
function applyThreadFilters(threads, emailById) {
  const cat = $("#filterCategory").value;
  const q = ($("#filterSearch").value || "").trim().toLowerCase();
  return threads.filter(t => {
    const emailsInThread = (t.emailDocIds.length ? t.emailDocIds : t.emailIds)
      .map(id => emailById.get(id))
      .filter(Boolean);
    if (cat) {
      // keep thread if any email matches the category
      if (!emailsInThread.some(e => e.category === cat)) return false;
    }
    if (q) {
      const hay = (
        t.normalizedSubject + " " +
        t.participants.join(" ") + " " +
        emailsInThread.map(e => `${e.sender} ${e.subject} ${e.summary} ${e.bodyText || ""}`).join(" ")
      ).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderSentimentEvolution(seq) {
  if (!seq || !seq.length) {
    return `<span class="sentiment-evolution" title="Nessun sentiment disponibile">—</span>`;
  }
  const parts = seq.map((s, i) => {
    const meta = SENTIMENT_LABELS[s] || SENTIMENT_LABELS.neutro;
    const arrow = i > 0 ? `<span class="arrow">›</span>` : "";
    return `${arrow}<span title="${escapeHtml(meta.label)}">${meta.emoji}</span>`;
  });
  return `<span class="sentiment-evolution" aria-label="Evoluzione sentiment">${parts.join("")}</span>`;
}

function renderThreadCard(t, emailById) {
  const subject = t.normalizedSubject || "(nessun oggetto)";
  const last = t.lastMessageAt;
  const firstParticipants = t.participants.slice(0, 3).join(", ");
  const moreCount = t.participants.length > 3 ? ` +${t.participants.length - 3}` : "";
  const partsLine = `${escapeHtml(firstParticipants)}${escapeHtml(moreCount)}`;

  const emailsHtml = (t.emailDocIds.length ? t.emailDocIds : t.emailIds)
    .map(id => emailById.get(id))
    .filter(Boolean)
    .sort((a, b) => (a.received || "").localeCompare(b.received || ""))
    .map(e => {
      const meta = SENTIMENT_LABELS[e.sentiment] || SENTIMENT_LABELS.neutro;
      const senderHtml = renderSenderInline(e.senderEmail || e.sender, e.senderName);
      return `
        <div class="thread-email" data-thread-email-id="${escapeHtml(e.id)}">
          <div class="thread-email-top">
            <div class="thread-email-sender">${senderHtml}</div>
            <div class="thread-email-date" title="${escapeHtml(formatReceivedFull(e.received))}">${escapeHtml(formatReceivedFull(e.received))}</div>
          </div>
          <div class="thread-email-summary">${escapeHtml(e.summary || "—")}</div>
          <div class="badges" style="margin-top:4px">
            <span class="badge cat-${escapeHtml(e.category)}">${escapeHtml(CATEGORY_LABELS[e.category] || e.category)}</span>
            <span class="badge sent sent-${escapeHtml(e.sentiment || "neutro")}"><span class="sent-emoji">${meta.emoji}</span>${escapeHtml(meta.label)}</span>
            ${renderFollowupBadges(e)}
          </div>
          <div class="thread-email-actions">
            <button class="btn-link" data-read="${escapeHtml(e.id)}">Leggi</button>
            <button class="btn-link" data-correct="${escapeHtml(e.id)}">Correggi</button>
          </div>
        </div>
      `;
    }).join("");

  return `
    <article class="thread-card" data-thread-id="${escapeHtml(t.id)}">
      <div class="thread-head" data-thread-toggle="${escapeHtml(t.id)}">
        <div class="thread-subject"><span class="thread-toggle-icon">▶</span>${escapeHtml(subject)}</div>
        <div class="thread-meta" title="${escapeHtml(formatReceivedFull(last))}">${escapeHtml(formatReceived(last))}</div>
        <div class="thread-info">
          <span class="thread-count">${t.messageCount} msg</span>
          ${renderSentimentEvolution(t.sentimentEvolution)}
          <span class="thread-participants" title="${escapeHtml(t.participants.join(", "))}">${partsLine}</span>
        </div>
      </div>
      <div class="thread-body">
        <div class="thread-emails">${emailsHtml}</div>
      </div>
    </article>
  `;
}

function renderThreads(threads, emails) {
  const emailById = new Map(emails.map(e => [e.id, e]));
  const filtered = applyThreadFilters(threads, emailById);
  const list = $("#threadList");
  $("#filterCount").textContent = `${filtered.length} thread (${emails.length} email totali)`;
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">Nessun thread corrisponde ai filtri.</div>`;
    return;
  }
  list.innerHTML = filtered.map(t => renderThreadCard(t, emailById)).join("");
  $$("[data-thread-toggle]", list).forEach(head => {
    head.addEventListener("click", () => {
      head.closest(".thread-card").classList.toggle("open");
    });

  $$("[data-read]", list).forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      openReadModal(btn.dataset.read);
    });
  });
  $$("[data-correct]", list).forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      openCorrectionModal(btn.dataset.correct);
    });
  });
  wireFollowupClicks(list);
  wireSenderClicks(list);
}

// --- Read modal ---
function formatRelativeDate(iso) {
  if (!iso) return "—";
  try {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return iso;
    const days = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (days <= 0) return "oggi";
    if (days === 1) return "1 giorno fa";
    if (days < 30) return `${days} giorni fa`;
    if (days < 365) return `${Math.round(days / 30)} mesi fa`;
    return `${Math.round(days / 365)} anni fa`;
  } catch { return iso; }
}

function renderHowHandled(h) {
  if (!h) return "";
  const parts = [];
  if (h.suggestedAction) {
    parts.push(`<span class="pill">Azione: ${escapeHtml(ACTION_LABELS[h.suggestedAction] || h.suggestedAction)}</span>`);
  }
  if (h.attentionStatus === "needs_attention") {
    parts.push(`<span class="pill attn">⏰ Senza risposta</span>`);
  } else if (h.attentionStatus === "replied" && h.repliedInDays !== null && h.repliedInDays !== undefined) {
    const d = h.repliedInDays;
    const lbl = d === 0 ? "in giornata" : d === 1 ? "in 1 giorno" : `in ${d} giorni`;
    parts.push(`<span class="pill replied">✓ Risposto ${escapeHtml(lbl)}</span>`);
  }
  if (h.wasCorrected) {
    const to = h.correctedCategory ? ` → ${CATEGORY_LABELS[h.correctedCategory] || h.correctedCategory}` : "";
    parts.push(`<span class="pill corrected">Corretta${escapeHtml(to)}</span>`);
  }
  return parts.length ? `<div class="similar-handled">${parts.join("")}</div>` : "";
}

function renderSimilarSection(email) {
  const sec = $("#readSimilar");
  const list = $("#readSimilarList");
  const sims = email.similarEmails || [];
  if (!sims.length) {
    sec.style.display = "none";
    list.innerHTML = "";
    return;
  }
  sec.style.display = "";
  list.innerHTML = `<div class="similar-list">${sims.map(s => {
    const handled = renderHowHandled(s.howHandled);
    const matchLabel = s.matchKey === "sender+condominio" ? "stesso mittente + condominio"
      : s.matchKey === "condominio" ? "stesso condominio" : "stesso mittente";
    const targetId = s.docId || s.emailId;
    return `
      <button class="similar-item" type="button" data-similar-open="${escapeHtml(targetId || "")}">
        <div class="similar-top">
          <span class="similar-match-key">${escapeHtml(matchLabel)}</span>
          <span class="similar-date" title="${escapeHtml(formatReceivedFull(s.date))}">${escapeHtml(formatRelativeDate(s.date))}</span>
        </div>
        <div class="similar-summary">${escapeHtml(s.summary || "—")}</div>
        ${handled}
      </button>
    `;
  }).join("")}</div>`;
  $$("[data-similar-open]", list).forEach(btn => {
    btn.addEventListener("click", () => {
      const target = btn.dataset.similarOpen;
      if (target && ACTIVE_EMAILS.find(e => e.id === target)) {
        openReadModal(target);
      }

}

function openReadModal(id) {
  const email = ACTIVE_EMAILS.find(e => e.id === id);
  if (!email) return;
  $("#readSender").textContent = email.sender || "(sconosciuto)";
  $("#readSubject").textContent = email.subject || "(nessun oggetto)";
  const metaParts = [];
  if (email.received) metaParts.push(formatReceivedFull(email.received));
  if (email.category) metaParts.push(CATEGORY_LABELS[email.category] || email.category);

function closeReadModal() {

}

// --- UI init ---
let ACTIVE_EMAILS = MOCK_EMAILS;
let ACTIVE_THREADS = [];
let SENDER_PROFILES = new Map(); // email → profile
let CURRENT_VIEW = "emails"; // "emails" | "threads"

// --- Sender profile popover (F5) ---
function getSenderProfile(email) {
  if (!email) return null;
  return SENDER_PROFILES.get(String(email).toLowerCase()) || null;
}

function isFrequentSender(email) {
  const p = getSenderProfile(email);
  return !!(p && p.isFrequent);
}

function renderSenderInline(email, displayName) {
  const safeEmail = String(email || "").toLowerCase();
  const p = getSenderProfile(safeEmail);
  const name = displayName || (p && p.displayName) || safeEmail || "(sconosciuto)";
  const star = (p && p.isFrequent)
    ? `<span class="frequent-star" title="Mittente frequente (${p.totalEmails} email)" aria-label="Mittente frequente">⭐</span>`
    : "";
  const dataAttr = p ? `data-sender-email="${escapeHtml(safeEmail)}"` : "";
  const cls = p ? "sender-clickable" : "";
  return `<span class="${cls}" ${dataAttr}>${escapeHtml(name)}</span>${star}`;
}

function formatLastContact(days) {
  if (days === null || days === undefined) return "—";
  if (days <= 0) return "oggi";
  if (days === 1) return "ieri";
  if (days < 30) return `${days} giorni fa`;
  if (days < 365) return `${Math.round(days / 30)} mesi fa`;
  return `${Math.round(days / 365)} anni fa`;
}

function formatFrequency(p) {
  // "X email in Y giorni/mesi" + media settimanale
  const total = p.totalEmails || 0;
  const days = p.daysActive || 1;
  let span;
  if (days < 30) span = `${days} ${days === 1 ? "giorno" : "giorni"}`;
  else if (days < 365) span = `${Math.round(days / 30)} mesi`;
  else span = `${Math.round(days / 365)} anni`;
  const avg = p.avgPerWeek || 0;
  const avgStr = avg >= 1 ? `~${avg.toFixed(1)}/sett.` : `~${(avg * 4).toFixed(1)}/mese`;
  return `${total} email in ${span} (${avgStr})`;
}

function openSenderPopover(email, anchorEl) {
  const profile = getSenderProfile(email);
  const pop = $("#senderPopover");
  if (!profile) {
    pop.classList.remove("open");
    return;
  }

  $("#popName").innerHTML = escapeHtml(profile.displayName || profile.email) +
    (profile.isFrequent ? `<span class="pop-frequent">⭐ Frequente</span>` : "");
  $("#popEmail").textContent = profile.email;

  const body = $("#popBody");
  const lines = [];
  lines.push(`<div class="pop-line"><strong>Frequenza:</strong> ${escapeHtml(formatFrequency(profile))}</div>`);
  lines.push(`<div class="pop-line"><strong>Ultimo contatto:</strong> ${escapeHtml(formatLastContact(profile.lastContactDaysAgo))}</div>`);

  const sentMeta = SENTIMENT_LABELS[profile.avgSentiment] || SENTIMENT_LABELS.neutro;
  lines.push(`<div class="pop-line"><strong>Sentiment medio:</strong> ${sentMeta.emoji} ${escapeHtml(sentMeta.label.toLowerCase())}</div>`);

  const cats = profile.topCategoriesPct || {};
  const catEntries = Object.entries(cats).sort((a, b) => b[1] - a[1]).slice(0, 4);
  if (catEntries.length) {
    const chips = catEntries.map(([k, pct]) =>
      `<span class="badge cat-${escapeHtml(k)}">${escapeHtml(CATEGORY_LABELS[k] || k)} ${pct}%</span>`
    ).join("");
    lines.push(`<div class="pop-line"><strong>Categorie:</strong></div><div class="pop-cats">${chips}</div>`);
  }

  const condos = profile.condominiosMentioned || [];
  if (condos.length) {
    const list = condos.slice(0, 4).map(c => escapeHtml(c)).join(" · ");
    const more = condos.length > 4 ? ` +${condos.length - 4}` : "";
    lines.push(`<div class="pop-condos"><strong>Condomini citati:</strong> ${list}${escapeHtml(more)}</div>`);
  }

  body.innerHTML = lines.join("");

  // position next to anchor (clamp inside viewport)
  const rect = anchorEl.getBoundingClientRect();
  pop.style.visibility = "hidden";
  pop.classList.add("open");
  const pw = pop.offsetWidth;
  const ph = pop.offsetHeight;
  let left = rect.left;
  let top = rect.bottom + 6;
  if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
  if (left < 12) left = 12;
  if (top + ph > window.innerHeight - 12) top = rect.top - ph - 6;
  if (top < 12) top = 12;
  pop.style.left = `${Math.round(left)}px`;
  pop.style.top = `${Math.round(top)}px`;
  pop.style.visibility = "";
}

function closeSenderPopover() {
  $("#senderPopover").classList.remove("open");
}

function wireSenderClicks(root) {
  $$("[data-sender-email]", root).forEach(el => {
    el.addEventListener("click", (ev) => {
      ev.stopPropagation();
      const email = el.dataset.senderEmail;
      const pop = $("#senderPopover");
      const isOpenForSame = pop.classList.contains("open") && pop.dataset.currentEmail === email;
      if (isOpenForSame) {
        closeSenderPopover();
        pop.dataset.currentEmail = "";
      } else {
        openSenderPopover(email, el);
        pop.dataset.currentEmail = email;
      }
    });
  });
}

// --- Digest (F4) ---
function isToday(iso) {
  if (!iso) return false;
  try {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return false;
    const now = new Date();
    return d.getFullYear() === now.getFullYear()
      && d.getMonth() === now.getMonth()
      && d.getDate() === now.getDate();
  } catch { return false; }
}

function priorityScore(e) {
  // Higher = more important. Used to pick top 3.
  let s = 0;
  if (URGENT_CATEGORIES.has(e.category)) s += 100;
  if (e.sentiment === "disperato") s += 60;
  else if (e.sentiment === "arrabbiato") s += 40;
  else if (e.sentiment === "frustrato") s += 15;
  if (e.followup) {
    if (e.followup.needsAttention) s += 25 + Math.min(20, (e.followup.daysWithoutReply || 0) * 2);
    if (e.followup.isFollowup) s += 10;
  }
  if (e.action === "URGENTE_CHIAMA") s += 30;
  else if (e.action === "APRI_INTERVENTO") s += 15;
  else if (e.action === "RISPONDI") s += 8;
  // Recency tiebreaker.
  const t = e.received ? new Date(e.received).getTime() : 0;
  return s + Math.min(5, (t / 1e12));
}

function renderDigest(emails) {
  const total = emails.length;
  const today = emails.filter(e => isToday(e.received)).length;
  const urgent = emails.filter(e => URGENT_CATEGORIES.has(e.category)).length;
  const attention = emails.filter(e => e.followup && e.followup.needsAttention).length;

  const sumEl = $("#digestSummary");
  if (!total) {
    sumEl.innerHTML = "Nessuna email caricata.";
  } else {
    const todayLabel = today === 1 ? "email ricevuta oggi" : "email ricevute oggi";
    const urgentLabel = urgent === 1 ? "urgente" : "urgenti";
    const attnLabel = attention === 1 ? "senza risposta da più di 48h" : "senza risposta da più di 48h";
    sumEl.innerHTML =
      `Oggi <span class="num">${today}</span> ${todayLabel}. ` +
      `<span class="num urgent">${urgent}</span> ${urgentLabel}. ` +
      `<span class="num attn">${attention}</span> ${attnLabel}.`;
  }

  const top = [...emails]
    .map(e => ({ e, score: priorityScore(e) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 3)
    .map(x => x.e);

  const topEl = $("#digestTop");
  if (!top.length) {
    topEl.innerHTML = `<div class="digest-empty">Nessuna email da segnalare.</div>`;
  } else {
    topEl.innerHTML = top.map((e, i) => {
      const sender = e.senderName || e.senderEmail || e.sender || "(sconosciuto)";
      const summary = e.summary || e.subject || "—";
      let badgeHtml = "";
      if (URGENT_CATEGORIES.has(e.category)) {
        badgeHtml = `<span class="digest-item-badge badge cat-${escapeHtml(e.category)}">${escapeHtml(CATEGORY_LABELS[e.category] || e.category)}</span>`;
      } else if (e.followup && e.followup.needsAttention) {
        const days = e.followup.daysWithoutReply;
        badgeHtml = `<span class="digest-item-badge badge attn">⏰ ${days}g</span>`;
      } else if (e.followup && e.followup.isFollowup) {
        badgeHtml = `<span class="digest-item-badge badge followup">🔄 Sollecito</span>`;
      } else {
        badgeHtml = `<span class="digest-item-badge badge cat-${escapeHtml(e.category)}">${escapeHtml(CATEGORY_LABELS[e.category] || e.category)}</span>`;
      }
      return `
        <button class="digest-item" type="button" data-digest-open="${escapeHtml(e.id)}">
          <span class="digest-item-rank">#${i + 1}</span>
          <span class="digest-item-text">
            <div class="digest-item-sender">${escapeHtml(sender)}</div>
            <div class="digest-item-summary">${escapeHtml(summary)}</div>
          </span>
          ${badgeHtml}
        </button>
      `;
    }).join("");
    $$("[data-digest-open]", topEl).forEach(btn => {
      btn.addEventListener("click", () => openReadModal(btn.dataset.digestOpen));
    });
  }

  $("#digestUpdated").textContent =
    "Aggiornato " + new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
}

function refreshView() {
  renderDigest(ACTIVE_EMAILS);
  if (CURRENT_VIEW === "threads") {
    $("#emailList").style.display = "none";
    $("#threadList").style.display = "";

    if (e.target === $("#modalBackdrop")) closeCorrectionModal();
  });
  $("#readClose").addEventListener("click", closeReadModal);
  $("#readBackdrop").addEventListener("click", (e) => {
    if (e.target === $("#readBackdrop")) closeReadModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { closeReadModal(); closeCorrectionModal(); closeSenderPopover(); }
  });
  document.addEventListener("click", (e) => {
    const pop = $("#senderPopover");
    if (!pop.classList.contains("open")) return;
    if (pop.contains(e.target) || e.target.closest("[data-sender-email]")) return;
    closeSenderPopover();
  });
  $("#popClose").addEventListener("click", closeSenderPopover);
  window.addEventListener("scroll", closeSenderPopover, { passive: true });
  window.addEventListener("resize", closeSenderPopover);

  $("#correctionForm").addEventListener("submit", (e) => {
    e.preventDefault();
    // TODO: POST /api/emails/:id/correct
    console.log("Correzione:", currentCorrectionId, {
      category: $("#corrCategory").value,
      suggestedAction: $("#corrAction").value,
      notes: $("#corrNotes").value,
    });
    closeCorrectionModal();
  });

  updateHeaderStats(ACTIVE_EMAILS);
  refreshView();

  const real = await loadEmailsFromFirestore();
  if (real && real.length > 0) {
    ACTIVE_EMAILS = real;
    updateHeaderStats(ACTIVE_EMAILS);
    $("#userEmail").textContent = `Firestore live (${real.length})`;
  }
  const [threads, profiles] = await Promise.all([
    loadThreadsFromFirestore(),
    loadSenderProfilesFromFirestore(),
  ]);
  if (threads && threads.length > 0) ACTIVE_THREADS = threads;
  if (profiles && profiles.size > 0) SENDER_PROFILES = profiles;
  refreshView();
}

function showApp(userEmail) {
  $("#loginView").classList.add("hidden");
  $("#appView").classList.add("active");
  $("#userEmail").textContent = userEmail || "alberto@acgclima.it";
  initUI();
}
function showLogin() {
  $("#loginView").classList.remove("hidden");
  $("#appView").classList.remove("active");
}

// --- Auth flow ---
async function bootAuth() {
  if (MOCK_MODE) {
    showApp("alberto@acgclima.it");
    $("#logoutBtn").addEventListener("click", showLogin);
    $("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      showApp("alberto@acgclima.it");
    });
    return;
  }

  if (!isFirebaseConfigured()) {
    $("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      $("#loginError").textContent = "Firebase non configurato. Apri con ?mock=1 per la demo.";
    });
    return;
  }

  let firebaseApp, firebaseAuth;
  try {
    firebaseApp = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
    firebaseAuth = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js");
  } catch (err) {
    $("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      $("#loginError").textContent = "Firebase SDK non raggiungibile.";
    });
    return;
  }
  const app = firebaseApp.initializeApp(FIREBASE_CONFIG);
  const auth = firebaseAuth.getAuth(app);
  firebaseAuth.onAuthStateChanged(auth, (user) => {
    if (user) showApp(user.email); else showLogin();
  });
  $("#loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("#loginError").textContent = "";
    try {
      await firebaseAuth.signInWithEmailAndPassword(auth, $("#email").value, $("#password").value);
    } catch {
      $("#loginError").textContent = "Credenziali non valide.";
    }
  });
  $("#logoutBtn").addEventListener("click", () => firebaseAuth.signOut(auth));
}

bootAuth();
</script>
