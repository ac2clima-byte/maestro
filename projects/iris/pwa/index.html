<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>IRIS — Collega Email di NEXO</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-soft: #fafafa;
    --border: #e6e6ea;
    --border-strong: #d1d1d7;
    --text: #1a1a1f;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --accent: #2563eb;
    --ok: #059669;
    --warn: #d97706;
    --err: #dc2626;

    /* Category palette — soft backgrounds + saturated text, inspired by Linear/Notion labels. */
    --cat-richiesta-bg: #eff6ff;      --cat-richiesta-fg: #1d4ed8;      --cat-richiesta-bd: #bfdbfe;
    --cat-guasto-bg: #fef2f2;         --cat-guasto-fg: #b91c1c;         --cat-guasto-bd: #fecaca;
    --cat-preventivo-bg: #ecfdf5;     --cat-preventivo-fg: #047857;     --cat-preventivo-bd: #a7f3d0;
    --cat-conferma-bg: #ecfdf5;       --cat-conferma-fg: #047857;       --cat-conferma-bd: #a7f3d0;
    --cat-fattura-bg: #fff7ed;        --cat-fattura-fg: #c2410c;        --cat-fattura-bd: #fed7aa;
    --cat-interna-bg: #f3f4f6;        --cat-interna-fg: #4b5563;        --cat-interna-bd: #e5e7eb;
    --cat-pec-bg: #f5f3ff;            --cat-pec-fg: #6d28d9;            --cat-pec-bd: #ddd6fe;
    --cat-admin-bg: #eff6ff;          --cat-admin-fg: #1d4ed8;          --cat-admin-bd: #bfdbfe;
    --cat-risposta-bg: #ecfdf5;       --cat-risposta-fg: #047857;       --cat-risposta-bd: #a7f3d0;
    --cat-spam-bg: #f9fafb;           --cat-spam-fg: #9ca3af;           --cat-spam-bd: #e5e7eb;
    --cat-altro-bg: #f3f4f6;          --cat-altro-fg: #6b7280;          --cat-altro-bd: #e5e7eb;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font: inherit; cursor: pointer; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }

  /* --- Login view (manteniamo, anche se in v0.1 è bypassata) --- */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: var(--surface-soft);
  }
  .login-wrap.hidden { display: none; }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow-md);
  }
  .login-card h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  .login-card .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.95rem;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 500;
    font-size: 0.95rem;
    transition: background 0.12s;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary.full { width: 100%; }
  .login-error { color: var(--err); font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }

  /* --- App shell --- */
  .app { display: none; }
  .app.active { display: block; }

  .header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header .brand {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .header .brand .brand-sub {
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 6px;
    font-size: 0.85rem;
  }
  .header-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 0.85rem;
  }
  .header-stat { color: var(--text-muted); }
  .header-stat strong { color: var(--text); font-weight: 600; }
  .header-stat.urgent strong { color: var(--err); }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    color: var(--text-muted);
    transition: border-color 0.12s, color 0.12s;
  }
  .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }

  main { max-width: 860px; margin: 0 auto; padding: 20px; }

  /* --- Filter bar --- */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-bar select,
  .filter-bar input[type="search"],
  .filter-bar input[type="date"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    min-height: 36px;
  }
  .filter-bar select:focus,
  .filter-bar input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }
  .filter-bar input[type="search"] {
    flex: 1 1 220px;
    min-width: 180px;
  }
  .filter-bar .count {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-left: auto;
  }

  /* --- Email cards --- */
  .email-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .email-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.12s;
  }
  .email-card:hover { border-color: var(--border-strong); }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }
  .sender { font-weight: 600; font-size: 0.98rem; color: var(--text); word-break: break-word; }
  .received { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; flex-shrink: 0; }
  .subject { font-weight: 600; font-size: 1rem; margin-top: 4px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .summary {
    color: var(--text-muted);
    font-size: 0.92rem;
    margin: 8px 0 12px 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entities {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .chip {
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
  }
  .chip strong { color: var(--text); font-weight: 500; }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    border: 1px solid transparent;
    line-height: 1.5;
  }

  /* Category badge palette */
  .badge.cat-RICHIESTA_INTERVENTO       { background: var(--cat-richiesta-bg);  color: var(--cat-richiesta-fg);  border-color: var(--cat-richiesta-bd); }
  .badge.cat-GUASTO_URGENTE             { background: var(--cat-guasto-bg);     color: var(--cat-guasto-fg);     border-color: var(--cat-guasto-bd); }
  .badge.cat-PREVENTIVO                 { background: var(--cat-preventivo-bg); color: var(--cat-preventivo-fg); border-color: var(--cat-preventivo-bd); }
  .badge.cat-CONFERMA_APPUNTAMENTO      { background: var(--cat-conferma-bg);   color: var(--cat-conferma-fg);   border-color: var(--cat-conferma-bd); }
  .badge.cat-FATTURA_FORNITORE          { background: var(--cat-fattura-bg);    color: var(--cat-fattura-fg);    border-color: var(--cat-fattura-bd); }
  .badge.cat-COMUNICAZIONE_INTERNA      { background: var(--cat-interna-bg);    color: var(--cat-interna-fg);    border-color: var(--cat-interna-bd); }
  .badge.cat-PEC_UFFICIALE              { background: var(--cat-pec-bg);        color: var(--cat-pec-fg);        border-color: var(--cat-pec-bd); }
  .badge.cat-AMMINISTRATORE_CONDOMINIO  { background: var(--cat-admin-bg);      color: var(--cat-admin-fg);      border-color: var(--cat-admin-bd); }
  .badge.cat-RISPOSTA_CLIENTE           { background: var(--cat-risposta-bg);   color: var(--cat-risposta-fg);   border-color: var(--cat-risposta-bd); }
  .badge.cat-NEWSLETTER_SPAM            { background: var(--cat-spam-bg);       color: var(--cat-spam-fg);       border-color: var(--cat-spam-bd); }
  .badge.cat-ALTRO                      { background: var(--cat-altro-bg);      color: var(--cat-altro-fg);      border-color: var(--cat-altro-bd); }

  /* Confidence badge */
  .badge.conf {
    background: var(--surface-soft);
    color: var(--text-muted);
    border-color: var(--border);
  }
  .badge.conf .pip {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .badge.conf.high .pip { background: var(--ok); }
  .badge.conf.medium .pip { background: var(--warn); }
  .badge.conf.low .pip { background: var(--err); }

  /* Sentiment badge — soft surface + coloured dot, same language as confidence */
  .badge.sent {
    background: var(--surface-soft);
    color: var(--text-muted);
    border-color: var(--border);
  }
  .badge.sent .sent-emoji { font-size: 0.9em; line-height: 1; }
  .badge.sent-positivo    { color: #047857; border-color: #a7f3d0; background: #ecfdf5; }
  .badge.sent-neutro      { color: #6b7280; border-color: #e5e7eb; background: #f9fafb; }
  .badge.sent-frustrato   { color: #a16207; border-color: #fde68a; background: #fefce8; }
  .badge.sent-arrabbiato  { color: #c2410c; border-color: #fed7aa; background: #fff7ed; }
  .badge.sent-disperato   { color: #b91c1c; border-color: #fecaca; background: #fef2f2; }

  .card-actions { display: flex; gap: 6px; }
  .btn-link {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.85rem;
    color: var(--text-muted);
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  .btn-link:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-soft); }

  .empty {
    text-align: center;
    color: var(--text-muted);
    padding: 48px 20px;
    background: var(--surface-soft);
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  /* --- Modal (correzione + lettura) --- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
  }
  .modal h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
  .modal .modal-sub {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 18px;
    word-break: break-word;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
  }

  /* Read modal: dedicated, wider, with scrollable monospaced body */
  .read-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    width: 100%;
    max-width: 760px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
  }
  .read-modal header {
    padding: 0 0 14px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
    position: static;
    background: transparent;
    display: block;
  }
  .read-sender { font-weight: 600; font-size: 0.95rem; word-break: break-word; color: var(--text); }
  .read-subject { font-size: 1rem; margin-top: 4px; color: var(--text); font-weight: 600; }
  .read-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  .read-body {
    flex: 1 1 auto;
    overflow-y: auto;
    background: var(--surface-soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .read-body.empty-body { color: var(--text-muted); font-style: italic; }

  /* --- Responsive --- */
  @media (max-width: 640px) {
    body { font-size: 15px; }
    .header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .brand-sub { display: none; }
    .header-stats { font-size: 0.8rem; gap: 12px; }
    main { padding: 14px; }
    .email-card { padding: 14px 16px; border-radius: 10px; }
    .card-top { flex-direction: column; align-items: flex-start; gap: 2px; }
    .received { font-size: 0.78rem; }
    .subject { white-space: normal; }
    .card-bottom { flex-direction: column; align-items: flex-start; gap: 10px; }
    .card-actions { width: 100%; justify-content: flex-start; }
    .filter-bar .count { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<!-- Login view (per quando riabiliteremo l'auth) -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <h1>IRIS</h1>
    <div class="subtitle">NEXO · il tuo triage email HVAC</div>
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="nome@acgclima.it" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary full">Accedi</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>

<!-- App shell -->
<div id="appView" class="app">
  <header class="header">
    <div class="brand">IRIS<span class="brand-sub">Collega Email di NEXO</span></div>
    <div class="header-stats">
      <div class="header-stat"><strong id="statTotal">0</strong> email</div>
      <div class="header-stat urgent"><strong id="statUrgent">0</strong> urgenti</div>
    </div>
    <div class="header-actions">
      <span id="userEmail" class="header-stat" style="font-size: 0.8rem;">—</span>
      <button id="logoutBtn" class="btn-ghost">Logout</button>
    </div>
  </header>

  <main>
    <div class="filter-bar">
      <select id="filterCategory" aria-label="Filtro per categoria">
        <option value="">Tutte le categorie</option>
      </select>
      <input type="search" id="filterSearch" placeholder="Cerca mittente, oggetto o contenuto…">
      <span class="count" id="filterCount">0 email</span>
    </div>

    <section class="email-list" id="emailList"></section>
  </main>
</div>

<!-- Correction modal -->
<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal">
    <h2>Correggi classificazione</h2>
    <div class="modal-sub" id="modalSub">—</div>
    <form id="correctionForm">
      <div class="field">
        <label for="corrCategory">Categoria corretta</label>
        <select id="corrCategory" required></select>
      </div>
      <div class="field">
        <label for="corrAction">Azione suggerita</label>
        <select id="corrAction" required></select>
      </div>
      <div class="field">
        <label for="corrNotes">Note (opzionale)</label>
        <textarea id="corrNotes" rows="3" placeholder="Spiega brevemente perché…"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="modalCancel">Annulla</button>
        <button type="submit" class="btn-primary">Salva</button>
      </div>
    </form>
  </div>
</div>

<!-- Read email modal -->
<div id="readBackdrop" class="modal-backdrop">
  <div class="read-modal" role="dialog" aria-labelledby="readSubject">
    <header>
      <div id="readSender" class="read-sender">—</div>
      <div id="readSubject" class="read-subject">—</div>
      <div id="readMeta" class="read-meta">—</div>
    </header>
    <div id="readBody" class="read-body">Caricamento…</div>
    <div class="modal-actions">
      <button type="button" class="btn-primary" id="readClose">Chiudi</button>
    </div>
  </div>
</div>

<script type="module">
const params = new URLSearchParams(location.search);
// TEMP v0.1: login bypassato, la dashboard parte subito.
// Ripristinare `params.get("mock") === "1"` quando Firebase Auth sarà configurato.
const MOCK_MODE = true;

const CATEGORY_LABELS = {
  RICHIESTA_INTERVENTO: "Richiesta intervento",
  GUASTO_URGENTE: "Guasto urgente",
  PREVENTIVO: "Preventivo",
  CONFERMA_APPUNTAMENTO: "Conferma appuntamento",
  FATTURA_FORNITORE: "Fattura fornitore",
  COMUNICAZIONE_INTERNA: "Interno",
  PEC_UFFICIALE: "PEC",
  AMMINISTRATORE_CONDOMINIO: "Amministratore",
  RISPOSTA_CLIENTE: "Risposta cliente",
  NEWSLETTER_SPAM: "Newsletter",
  ALTRO: "Altro",
};
const ACTION_LABELS = {
  RISPONDI: "Rispondi",
  APRI_INTERVENTO: "Apri intervento",
  INOLTRA: "Inoltra",
  ARCHIVIA: "Archivia",
  PREPARA_PREVENTIVO: "Prepara preventivo",
  VERIFICA_PAGAMENTO: "Verifica pagamento",
  URGENTE_CHIAMA: "Urgente — chiama",
};
const CONFIDENCE_LABELS = { high: "Alta", medium: "Media", low: "Bassa" };
const SENTIMENT_LABELS = {
  positivo:   { label: "Positivo",    emoji: "😊" },
  neutro:     { label: "Neutro",      emoji: "😐" },
  frustrato:  { label: "Frustrato",   emoji: "😤" },
  arrabbiato: { label: "Arrabbiato",  emoji: "😡" },
  disperato:  { label: "Disperato",   emoji: "😰" },
};
const URGENT_CATEGORIES = new Set(["GUASTO_URGENTE", "PEC_UFFICIALE"]);

// --- Firebase config ---
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBqm4XYaSlq2yUFdpcsL0wtSOpn48cOHoo",
  authDomain: "nexo-hub-15f2d.firebaseapp.com",
  projectId: "nexo-hub-15f2d",
  storageBucket: "nexo-hub-15f2d.firebasestorage.app",
  messagingSenderId: "272099489624",
  appId: "1:272099489624:web:10d17611b19031757d172d",
};
function isFirebaseConfigured() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "REPLACE_ME";
}

async function loadEmailsFromFirestore() {
  try {
    const appMod = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
    const fsMod = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");
    const app = appMod.initializeApp(FIREBASE_CONFIG);
    const db = fsMod.getFirestore(app);
    const q = fsMod.query(
      fsMod.collection(db, "iris_emails"),
      fsMod.orderBy("raw.received_time", "desc"),
      fsMod.limit(100),
    );
    const snap = await fsMod.getDocs(q);
    const emails = [];
    snap.forEach((doc) => {
      const d = doc.data();
      const raw = d.raw || {};
      const cls = d.classification || {};
      emails.push({
        id: doc.id,
        received: raw.received_time || "",
        senderEmail: raw.sender || "",
        senderName: raw.sender_name || "",
        sender: raw.sender_name
          ? `${raw.sender_name} <${raw.sender}>`
          : (raw.sender || "(sconosciuto)"),
        subject: raw.subject || "(nessun oggetto)",
        category: cls.category || "ALTRO",
        confidence: cls.confidence || "low",
        summary: cls.summary || "",
        entities: cls.entities || {},
        action: cls.suggestedAction || "ARCHIVIA",
        bodyText: raw.body_text || "",
        sentiment: cls.sentiment || "neutro",
        sentimentReason: cls.sentimentReason || "",
      });
    });
    return emails;
  } catch (err) {
    console.warn("[IRIS] Firestore load failed, using mock data:", err.message || err);
    return null;
  }
}

// --- DOM helpers ---
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function formatReceived(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return iso;
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) {
      return d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
    }
    return d.toLocaleDateString("it-IT", { day: "2-digit", month: "short" });
  } catch { return iso; }
}
function formatReceivedFull(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return iso;
    return d.toLocaleString("it-IT", {
      day: "2-digit", month: "2-digit", year: "numeric",
      hour: "2-digit", minute: "2-digit",
    });
  } catch { return iso; }
}

// --- Stats ---
function updateHeaderStats(emails) {
  const total = emails.length;
  const urgent = emails.filter(e => URGENT_CATEGORIES.has(e.category)).length;
  $("#statTotal").textContent = total;
  $("#statUrgent").textContent = urgent;
}

// --- Card rendering ---
function renderEntities(ent) {
  const keys = Object.keys(ent || {});
  if (!keys.length) return "";
  return `<div class="entities">${keys.map(k => `
    <span class="chip"><strong>${escapeHtml(k)}:</strong> ${escapeHtml(ent[k])}</span>
  `).join("")}</div>`;
}

function renderSentimentBadge(e) {
  const s = e.sentiment || "neutro";
  const meta = SENTIMENT_LABELS[s] || SENTIMENT_LABELS.neutro;
  const title = e.sentimentReason ? `title="${escapeHtml(e.sentimentReason)}"` : "";
  return `<span class="badge sent sent-${escapeHtml(s)}" ${title}>` +
    `<span class="sent-emoji" aria-hidden="true">${meta.emoji}</span>` +
    `${escapeHtml(meta.label)}</span>`;
}
function renderEmailCard(e) {
  const senderDisplay = e.senderName || e.sender;
  return `
    <article class="email-card" data-id="${escapeHtml(e.id)}">
      <div class="card-top">
        <div class="sender">${escapeHtml(senderDisplay)}</div>
        <div class="received" title="${escapeHtml(formatReceivedFull(e.received))}">${escapeHtml(formatReceived(e.received))}</div>
      </div>
      <div class="subject">${escapeHtml(e.subject)}</div>
      <div class="summary">${escapeHtml(e.summary || "—")}</div>
      ${renderEntities(e.entities)}
      <div class="card-bottom">
        <div class="badges">
          <span class="badge cat-${escapeHtml(e.category)}">${escapeHtml(CATEGORY_LABELS[e.category] || e.category)}</span>
          <span class="badge conf ${escapeHtml(e.confidence)}"><span class="pip"></span>${escapeHtml(CONFIDENCE_LABELS[e.confidence] || e.confidence)}</span>
          ${renderSentimentBadge(e)}
        </div>
        <div class="card-actions">
          <button class="btn-link" data-read="${escapeHtml(e.id)}">Leggi</button>
          <button class="btn-link" data-correct="${escapeHtml(e.id)}">Correggi</button>
        </div>
      </div>
    </article>
  `;
}

function applyFilters(emails) {
  const cat = $("#filterCategory").value;
  const q = ($("#filterSearch").value || "").trim().toLowerCase();
  return emails.filter(e => {
    if (cat && e.category !== cat) return false;
    if (q) {
      const hay = `${e.sender} ${e.subject} ${e.summary} ${e.bodyText || ""}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render(emails) {
  const filtered = applyFilters(emails);
  $("#filterCount").textContent = `${filtered.length} email`;
  const list = $("#emailList");
  if (!filtered.length) {
    list.innerHTML = `<div class="empty">Nessuna email corrisponde ai filtri.</div>`;
    return;
  }
  list.innerHTML = filtered.map(renderEmailCard).join("");
  $$("[data-read]", list).forEach(btn => {
    btn.addEventListener("click", () => openReadModal(btn.dataset.read));
  });
  $$("[data-correct]", list).forEach(btn => {
    btn.addEventListener("click", () => openCorrectionModal(btn.dataset.correct));
  });
}

// --- Correction modal ---
let currentCorrectionId = null;
function openCorrectionModal(id) {
  const email = ACTIVE_EMAILS.find(e => e.id === id);
  if (!email) return;
  currentCorrectionId = id;
  $("#modalSub").textContent = `${email.sender} — ${email.subject}`;
  $("#corrCategory").value = email.category;
  $("#corrAction").value = email.action;
  $("#corrNotes").value = "";
  $("#modalBackdrop").classList.add("open");
}
function closeCorrectionModal() {
  $("#modalBackdrop").classList.remove("open");
  currentCorrectionId = null;
}

// --- Read modal ---
function openReadModal(id) {
  const email = ACTIVE_EMAILS.find(e => e.id === id);
  if (!email) return;
  $("#readSender").textContent = email.sender || "(sconosciuto)";
  $("#readSubject").textContent = email.subject || "(nessun oggetto)";
  const metaParts = [];
  if (email.received) metaParts.push(formatReceivedFull(email.received));
  if (email.category) metaParts.push(CATEGORY_LABELS[email.category] || email.category);
  $("#readMeta").textContent = metaParts.join(" · ") || "—";
  const bodyEl = $("#readBody");
  if (email.bodyText && email.bodyText.trim()) {
    bodyEl.classList.remove("empty-body");
    bodyEl.textContent = email.bodyText;
    bodyEl.scrollTop = 0;
  } else {
    bodyEl.classList.add("empty-body");
    bodyEl.textContent = "(corpo email non disponibile)";
  }
  $("#readBackdrop").classList.add("open");
}
function closeReadModal() {
  $("#readBackdrop").classList.remove("open");
}

// --- UI init ---
let ACTIVE_EMAILS = MOCK_EMAILS;

async function initUI() {
  const catEntries = Object.entries(CATEGORY_LABELS);
  const actionEntries = Object.entries(ACTION_LABELS);
  $("#filterCategory").innerHTML = `<option value="">Tutte le categorie</option>` +
    catEntries.map(([v, l]) => `<option value="${v}">${escapeHtml(l)}</option>`).join("");
  $("#corrCategory").innerHTML = catEntries.map(([v, l]) => `<option value="${v}">${escapeHtml(l)}</option>`).join("");
  $("#corrAction").innerHTML = actionEntries.map(([v, l]) => `<option value="${v}">${escapeHtml(l)}</option>`).join("");

  $("#filterCategory").addEventListener("change", () => render(ACTIVE_EMAILS));
  $("#filterSearch").addEventListener("input", () => render(ACTIVE_EMAILS));

  $("#modalCancel").addEventListener("click", closeCorrectionModal);
  $("#modalBackdrop").addEventListener("click", (e) => {
    if (e.target === $("#modalBackdrop")) closeCorrectionModal();
  });
  $("#readClose").addEventListener("click", closeReadModal);
  $("#readBackdrop").addEventListener("click", (e) => {
    if (e.target === $("#readBackdrop")) closeReadModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { closeReadModal(); closeCorrectionModal(); }
  });

  $("#correctionForm").addEventListener("submit", (e) => {
    e.preventDefault();
    // TODO: POST /api/emails/:id/correct
    console.log("Correzione:", currentCorrectionId, {
      category: $("#corrCategory").value,
      suggestedAction: $("#corrAction").value,
      notes: $("#corrNotes").value,
    });
    closeCorrectionModal();
  });

  updateHeaderStats(ACTIVE_EMAILS);
  render(ACTIVE_EMAILS);

  const real = await loadEmailsFromFirestore();
  if (real && real.length > 0) {
    ACTIVE_EMAILS = real;
    updateHeaderStats(ACTIVE_EMAILS);
    render(ACTIVE_EMAILS);
    $("#userEmail").textContent = `Firestore live (${real.length})`;
  }
}

function showApp(userEmail) {
  $("#loginView").classList.add("hidden");
  $("#appView").classList.add("active");
  $("#userEmail").textContent = userEmail || "alberto@acgclima.it";
  initUI();
}
function showLogin() {
  $("#loginView").classList.remove("hidden");
  $("#appView").classList.remove("active");
}

// --- Auth flow ---
async function bootAuth() {
  if (MOCK_MODE) {
    showApp("alberto@acgclima.it");
    $("#logoutBtn").addEventListener("click", showLogin);
    $("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      showApp("alberto@acgclima.it");
    });
    return;
  }

  if (!isFirebaseConfigured()) {
    $("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      $("#loginError").textContent = "Firebase non configurato. Apri con ?mock=1 per la demo.";
    });
    return;
  }

  let firebaseApp, firebaseAuth;
  try {
    firebaseApp = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
    firebaseAuth = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js");
  } catch (err) {
    $("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      $("#loginError").textContent = "Firebase SDK non raggiungibile.";
    });
    return;
  }
  const app = firebaseApp.initializeApp(FIREBASE_CONFIG);
  const auth = firebaseAuth.getAuth(app);
  firebaseAuth.onAuthStateChanged(auth, (user) => {
    if (user) showApp(user.email); else showLogin();
  });
  $("#loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    $("#loginError").textContent = "";
    try {
      await firebaseAuth.signInWithEmailAndPassword(auth, $("#email").value, $("#password").value);
    } catch {
      $("#loginError").textContent = "Credenziali non valide.";
    }
  });
  $("#logoutBtn").addEventListener("click", () => firebaseAuth.signOut(auth));
}

bootAuth();
</script>
