<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#006eb7">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NEXO">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- ACG Suite Design System: DM Sans + JetBrains Mono + Material Icons Round -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<title>NEXO — Hub dei Colleghi</title>
<link rel="stylesheet" href="css/main.css?v=v03">
</head>
<body>

<!-- Auth gate (hidden when authenticated) -->
<div id="authGate" class="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">NEXO</div>
    <div class="auth-sub">Hub dei Colleghi AI — ACG Suite</div>
    <form id="authForm">
      <div>
        <label>Email</label>
        <input type="email" id="authEmail" required autocomplete="email" placeholder="nome@acgclimaservice.com">
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="authPassword" required autocomplete="current-password">
      </div>
      <button type="submit" class="auth-btn" id="authBtn">Accedi</button>
      <div class="auth-error" id="authError"></div>
    </form>
    <div class="auth-footer">
      Oppure <a href="https://acgsuite.web.app/" >accedi dalla Suite</a>
    </div>
  </div>
</div>

<div class="app" id="appRoot" hidden>

  <!-- Mobile topbar -->
  <div class="topbar">
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    <div style="font-weight:700;font-size:1.05rem;">NEXO</div>
    <div style="margin-left:auto;font-size:0.85rem;opacity:.7;" id="topbarTitle">Home</div>
  </div>

  <!-- Hamburger floating (visibile solo quando sidebar è nascosta su desktop) -->
  <button class="sidebar-toggle-floating" id="sidebarShowBtn" aria-label="Mostra menu" title="Mostra menu">☰</button>

  <aside class="sidebar collapsed" id="sidebar">
    <div class="sidebar-header" style="display:flex;align-items:flex-start;gap:10px;">
      <div style="flex:1;min-width:0;">
        <div class="sidebar-brand">NEXO</div>
        <div class="sidebar-tag">Hub dei Colleghi · ACG Suite</div>
      </div>
      <button class="sidebar-toggle-inline" id="sidebarHideBtn" aria-label="Nascondi menu" title="Nascondi menu">☰</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Dashboard</div>
      <button type="button" class="sidebar-link" data-route="home" aria-label="Home">
        <span class="icon">🏠</span><span class="name">Home</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Colleghi</div>
      <div id="collegiNav"></div>
    </div>

    <div class="sidebar-footer">
      <div class="user" id="footerUser">—</div>
      <div style="margin-top:4px;display:flex;gap:8px;align-items:center;">
        <span>v0.2 auth</span>
        <button id="logoutBtn" class="logout-btn" style="margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:0.72rem;font-family:inherit;">Esci</button>
      </div>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="page" id="page"></div>
    <div class="iris-frame-wrap">
      <iframe id="irisFrame" class="iris-frame" title="IRIS — Email" referrerpolicy="same-origin"></iframe>
    </div>
  </main>

</div>

<!-- Segnala bug — bottone globale fisso top-right (hidden finché auth non è completata) -->
<button id="reportBugBtn" class="report-bug-btn" type="button" aria-label="Segnala un bug" title="Segnala un bug" hidden>
  <span aria-hidden="true">🐛</span>
  <span class="report-bug-label">Segnala bug</span>
</button>

<!-- Segnala bug — modal -->
<div id="reportBugModal" class="report-bug-modal" role="dialog" aria-modal="true" aria-labelledby="reportBugTitle" aria-hidden="true">
  <div class="rb-card">
    <h2 id="reportBugTitle">Segnala un bug</h2>
    <p class="rb-hint">Descrivi cosa non funziona. La richiesta finisce nella coda dev di Claude Code.</p>
    <textarea id="reportBugText" placeholder="Descrivi cosa non funziona…" maxlength="4000"></textarea>
    <div class="rb-error" id="reportBugError"></div>
    <div class="rb-actions">
      <button type="button" class="rb-btn" id="reportBugCancel">Annulla</button>
      <button type="button" class="rb-btn rb-btn-primary" id="reportBugSubmit">Invia</button>
    </div>
  </div>
</div>

<!-- NEXUS chat — FAB + pannello -->
<button id="nexusFab" class="nexus-fab" aria-label="Apri NEXUS chat" title="Parla con NEXUS">
  <span aria-hidden="true">💬</span>
</button>

<div id="nexusPanel" class="nexus-panel" role="dialog" aria-labelledby="nexusTitle">
  <div class="nexus-header" id="nexusHeader">
    <div class="brand">
      <div class="avatar" aria-hidden="true">NX</div>
      <div>
        <div id="nexusTitle" class="name">NEXUS</div>
        <div class="hint" id="nexusStatus">online</div>
      </div>
    </div>
    <div class="nexus-header-actions">
      <button class="close" id="nexusStopTtsBtn" aria-label="Ferma voce" title="Ferma la voce" hidden>⏹</button>
      <button class="close" id="nexusTtsToggle" aria-label="Attiva lettura vocale" title="Attiva/disattiva lettura ad alta voce" hidden>🔇</button>
      <button class="close nexus-fullscreen-btn" id="nexusFullscreenBtn" aria-label="Espandi a tutto schermo" title="Espandi a tutto schermo">⛶</button>
      <button class="close" id="nexusClearBtn" aria-label="Cancella conversazione" title="Cancella la chat">🗑️</button>
      <button class="close" id="nexusClose" aria-label="Chiudi">×</button>
    </div>
  </div>
  <div id="nexusMessages" class="nexus-messages" aria-live="polite">
    <button id="nexusScrollDown" class="nexus-scroll-down" aria-label="Vai in fondo" title="Vai in fondo">↓</button>
  </div>
  <div id="nexusVoiceStatus" class="nexus-voice-status"></div>
  <div class="nexus-input">
    <button id="nexusAudioBtn" class="nexus-btn-icon" aria-label="Allega audio" title="Carica registrazione chiamata">📎</button>
    <input type="file" id="nexusAudioFile" accept="audio/*" hidden>
    <textarea id="nexusInput" rows="1" placeholder="Scrivi un messaggio…"></textarea>
    <button id="nexusMicBtn" class="nexus-btn-icon" aria-label="Detta la richiesta" title="Dettatura vocale" hidden>🎤</button>
    <button id="nexusSendBtn" class="nexus-btn-icon nexus-btn-send" aria-label="Invia" title="Invia">➤</button>
  </div>
</div>

<script type="module" src="js/app.js?v=v03"></script>
</body>
</html>
